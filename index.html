<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TEF AI Practice Tool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; }
    .hero { padding: 48px 0; }
    .timer { font-variant-numeric: tabular-nums; font-weight: 600; }
    .word-count { font-variant-numeric: tabular-nums; }
    .textarea { min-height: 220px; }
    .card-soft { box-shadow: 0 6px 16px rgba(18,38,63,.08); border: 1px solid #edf1f7; }
    .spinner-inline { width: 1.25rem; height: 1.25rem; }
    .metric-badge { font-size: .8rem; }
    .feedback pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">TEF AI Practice Tool</a>
      <span class="text-secondary small ms-auto" id="appVersion"></span>
    </div>
  </nav>

  <main class="container">
    <!-- Start Screen -->
    <section id="startScreen" class="hero text-center">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card card-soft">
            <div class="card-body p-5">
              <h1 class="h3 mb-2">Practice Modules</h1>
              <p class="text-secondary">Begin with Writing. More modules coming soon.</p>
              <button class="btn btn-primary btn-lg" id="startWritingBtn">Writing Practice</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Question Setup -->
    <section id="setupScreen" class="d-none">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card card-soft">
            <div class="card-body">
              <h2 class="h5 mb-3">Task A – Narrative Continuation</h2>
              <div class="mb-2 d-flex gap-2">
                <button class="btn btn-outline-primary" id="genTaskABtn">AI-generate question</button>
                <button class="btn btn-outline-secondary" id="clearTaskABtn">Clear</button>
              </div>
              <textarea class="form-control" id="taskAQuestion" rows="4" placeholder="Paste or generate your Task A question..."></textarea>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card card-soft">
            <div class="card-body">
              <h2 class="h5 mb-3">Task B – Opinion Letter</h2>
              <div class="mb-2 d-flex gap-2">
                <button class="btn btn-outline-primary" id="genTaskBBtn">AI-generate question</button>
                <button class="btn btn-outline-secondary" id="clearTaskBBtn">Clear</button>
              </div>
              <textarea class="form-control" id="taskBQuestion" rows="4" placeholder="Paste or generate your Task B question..."></textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="text-end mt-3">
        <button class="btn btn-secondary" id="backToStartBtn">Back</button>
        <button class="btn btn-primary" id="beginWritingBtn">Begin Writing</button>
      </div>
    </section>

    <!-- Writing Interface -->
    <section id="writingScreen" class="d-none">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card card-soft h-100">
            <div class="card-body d-flex flex-column">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="h5 m-0">Task A</h2>
                <div class="text-end small">
                  <div>Time left: <span class="timer" id="timer">--:--:--</span></div>
                  <div>Words: <span class="word-count" id="wordCountA">0</span> / <span id="minWordsA">80</span></div>
                </div>
              </div>
              <div class="bg-light p-3 rounded border mb-3" id="taskAQuestionDisplay"></div>
              <textarea class="form-control textarea" id="taskAResponse" placeholder="Write your Task A response here..."></textarea>
              <div class="mt-3 d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-secondary" id="resetA">Reset</button>
                <button class="btn btn-primary" id="submitA">Submit Task A</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card card-soft h-100">
            <div class="card-body d-flex flex-column">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="h5 m-0">Task B</h2>
                <div class="small">Words: <span class="word-count" id="wordCountB">0</span> / <span id="minWordsB">200</span></div>
              </div>
              <div class="bg-light p-3 rounded border mb-3" id="taskBQuestionDisplay"></div>
              <textarea class="form-control textarea" id="taskBResponse" placeholder="Write your Task B response here..."></textarea>
              <div class="mt-3 d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-secondary" id="resetB">Reset</button>
                <button class="btn btn-primary" id="submitBoth">Submit Both (A starts, B follows)</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="row g-4 mt-1">
        <div class="col-lg-6">
          <div class="card card-soft">
            <div class="card-body">
              <div class="d-flex align-items-center mb-2">
                <h3 class="h6 m-0">Task A Results</h3>
                <div class="ms-2 d-none" id="spinnerA"><div class="spinner-border spinner-inline text-primary" role="status"></div></div>
              </div>
              <div id="resultsA" class="feedback small text-secondary"></div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card card-soft">
            <div class="card-body">
              <div class="d-flex align-items-center mb-2">
                <h3 class="h6 m-0">Task B Results</h3>
                <div class="ms-2 d-none" id="spinnerB"><div class="spinner-border spinner-inline text-primary" role="status"></div></div>
              </div>
              <div id="resultsB" class="feedback small text-secondary"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const cfg = { writingTimeMinutes: 60, minWordsTaskA: 80, minWordsTaskB: 200 };

    // Load config from backend
    fetch('/api/config').then(r => r.json()).then(data => {
      cfg.writingTimeMinutes = data.writingTimeMinutes;
      cfg.minWordsTaskA = data.minWordsTaskA;
      cfg.minWordsTaskB = data.minWordsTaskB;
      $('#appVersion').textContent = `v${data.version}`;
      $('#minWordsA').textContent = cfg.minWordsTaskA;
      $('#minWordsB').textContent = cfg.minWordsTaskB;
    }).catch(()=>{});

    // Nav
    $('#startWritingBtn').onclick = () => { $('#startScreen').classList.add('d-none'); $('#setupScreen').classList.remove('d-none'); };
    $('#backToStartBtn').onclick = () => { $('#setupScreen').classList.add('d-none'); $('#startScreen').classList.remove('d-none'); };

    // Generate questions
    $('#genTaskABtn').onclick = async () => {
      const r = await fetch('/api/question', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({task: 'A'})});
      const j = await r.json();
      $('#taskAQuestion').value = j.question || '';
    };
    $('#genTaskBBtn').onclick = async () => {
      const r = await fetch('/api/question', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({task: 'B'})});
      const j = await r.json();
      $('#taskBQuestion').value = j.question || '';
    };
    $('#clearTaskABtn').onclick = ()=> $('#taskAQuestion').value='';
    $('#clearTaskBBtn').onclick = ()=> $('#taskBQuestion').value='';

    // Begin writing
    let timerId = null; let endAt = null;
    function startTimer(minutes){
      endAt = Date.now() + minutes*60*1000;
      renderTimer();
      timerId = setInterval(renderTimer, 1000);
    }
    function renderTimer(){
      const remaining = Math.max(0, endAt - Date.now());
      const s = Math.floor(remaining/1000); const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = s%60;
      $('#timer').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      if(remaining<=0 && timerId){ clearInterval(timerId); timerId=null; }
    }

    $('#beginWritingBtn').onclick = () => {
      $('#setupScreen').classList.add('d-none');
      $('#writingScreen').classList.remove('d-none');
      $('#taskAQuestionDisplay').textContent = $('#taskAQuestion').value.trim();
      $('#taskBQuestionDisplay').textContent = $('#taskBQuestion').value.trim();
      startTimer(cfg.writingTimeMinutes);
    };

    // Word counts
    function countWords(txt){
      return (txt.trim().match(/\b\w+\b/g)||[]).length;
    }
    function updateCounts(){
      $('#wordCountA').textContent = countWords($('#taskAResponse').value);
      $('#wordCountB').textContent = countWords($('#taskBResponse').value);
    }
    ['input','change'].forEach(e => {
      $('#taskAResponse').addEventListener(e, updateCounts);
      $('#taskBResponse').addEventListener(e, updateCounts);
    });

    $('#resetA').onclick = ()=> { $('#taskAResponse').value=''; updateCounts(); };
    $('#resetB').onclick = ()=> { $('#taskBResponse').value=''; updateCounts(); };

    // Submit flows
    function renderFeedback(container, data){
      const pretty = JSON.stringify(data, null, 2);
      container.innerHTML = `<pre class="mb-0">${pretty}</pre>`;
    }

  $('#submitA').onclick = async () => {
      $('#spinnerA').classList.remove('d-none');
      $('#resultsA').innerHTML = '';
      try{
        const body = {
          task_a_question: $('#taskAQuestionDisplay').textContent,
          task_a_response: $('#taskAResponse').value
        };
    const r = await fetch('/api/evaluate/task-a', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
        const j = await r.json();
    renderFeedback($('#resultsA'), j);
      }catch(err){
        $('#resultsA').textContent = 'Error evaluating Task A';
      } finally {
        $('#spinnerA').classList.add('d-none');
      }
    };

    $('#submitBoth').onclick = async () => {
      $('#spinnerA').classList.remove('d-none');
      $('#spinnerB').classList.remove('d-none');
      $('#resultsA').innerHTML = '';
      $('#resultsB').innerHTML = '';
      try{
        // First call Task A endpoint
        const bodyA = { task_a_question: $('#taskAQuestionDisplay').textContent, task_a_response: $('#taskAResponse').value };
        const rA = await fetch('/api/evaluate/task-a', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bodyA)});
        const jA = await rA.json();
        renderFeedback($('#resultsA'), jA);
        $('#spinnerA').classList.add('d-none');

        // Then call Task B endpoint
        const bq = $('#taskBQuestionDisplay').textContent.trim();
        const br = $('#taskBResponse').value.trim();
        if(bq && br){
          const bodyB = { task_b_question: bq, task_b_response: br };
          const rB = await fetch('/api/evaluate/task-b', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bodyB)});
          const jB = await rB.json();
          renderFeedback($('#resultsB'), jB);
        } else {
          $('#resultsB').textContent = 'No Task B input provided.';
        }
      }catch(err){
        $('#resultsA').textContent = 'Error evaluating.';
        $('#resultsB').textContent = '';
      } finally {
        $('#spinnerB').classList.add('d-none');
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
